{extends 'base.html' %}

{% block title %}
    Password Reset
{% endblock %}

{% block content %}
    <h1>Password Reset</h1>
    <p>Forgotten your password? Enter your email below, and we'll send instructions for setting a new.</p>
    <form method="Post">
        {% csrf_token %}
        {{form|crispy}}
        <input type="submit" value="Reset my password" class="btn btn-warning">
    </Form>
    {% endblock %}
